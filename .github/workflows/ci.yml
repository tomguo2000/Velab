name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: fota_password
          POSTGRES_DB: fota_db_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 mypy pytest-github-actions-annotate-failures

      - name: Lint with flake8
        run: |
          cd backend
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=venv,.venv
          # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics --exclude=venv,.venv

      - name: Type check with mypy
        run: |
          cd backend
          # We might need to install types
          pip install types-python-dateutil types-requests types-PyYAML
          mypy . --ignore-missing-imports --explicit-package-bases || true # Allow failure for now as it's new

      - name: Run tests with pytest
        env:
          TEST_DATABASE_URL: postgresql://postgres:fota_password@localhost:5432/fota_db_test
          POSTGRES_DB: fota_db_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: fota_password
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          STORAGE_ROOT: ./test_data
          PYTHONPATH: .
        run: |
          cd backend
          mkdir -p test_data
          pytest tests/ log_pipeline/tests/ -v --cov=api --cov=models --cov=services --cov=log_pipeline

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4

        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: |
          cd web
          npm ci

      - name: Lint
        run: |
          cd web
          npm run lint

      - name: Run tests
        run: |
          cd web
          npm run test:ci

      - name: Build
        run: |
          cd web
          npm run build
